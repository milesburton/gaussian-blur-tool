name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Build test container
        run: docker build -t gaussian-blur-tool-test .

      - name: Run lint, unit tests, and e2e tests
        run: |
          docker run --rm \
            -e CI=true \
            gaussian-blur-tool-test

      - name: Extract test artifacts on failure
        if: failure()
        run: |
          container_id=$(docker create gaussian-blur-tool-test)
          docker cp "$container_id:/app/playwright-report" ./playwright-report || true
          docker cp "$container_id:/app/test-results" ./test-results || true
          docker rm "$container_id"

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7
